<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="REDOOR schedule calendar" />
  <title>REDOOR Schedule</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#" aria-label="REDOOR Schedule 홈">
  <img src="IMG_5259.jpeg" alt="REDOOR" class="brand-logo">
</a>
    <nav class="top-nav" aria-label="주요 메뉴">
      <a href="profile.html">PROFILE</a>
      <a href="#calendar" class="active">SCHEDULE</a>
      <a href="#upcoming">UPCOMING</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="calendar-section" id="calendar">
      <div class="calendar-toolbar">
        <div class="month-control">
          <button id="prevMonth" class="icon-button" type="button" aria-label="이전 달">‹</button>
          <div class="month-heading" aria-live="polite">
            <div id="monthYear" class="month-year">2026. 07</div>
            <h1 id="monthTitle">JULY</h1>
          </div>
          <button id="nextMonth" class="icon-button" type="button" aria-label="다음 달">›</button>
        </div>
      </div>

      <div class="calendar-frame">
        <div class="calendar-grid weekdays" aria-hidden="true">
          <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div>
          <div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        <div id="calendarGrid" class="calendar-grid dates" aria-label="월간 달력"></div>
      </div>

      <section class="upcoming" id="upcoming">
        <div class="section-title">UPCOMING EVENTS</div>
        <div id="upcomingList" class="upcoming-list"></div>
      </section>
    </section>

    <aside id="eventPanel" class="event-panel" aria-live="polite">
      <div class="empty-state">
        <h2>일정이 있는 날짜를 선택해주세요.</h2>
        <p>일정이 있는 날짜를 누르면 시간, 장소, 예매 정보가 여기에 표시됩니다.</p>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <strong>REDOOR</strong>
    <span>FAN-MADE SCHEDULE</span>
  </footer>

  <script src="events.js"></script>
  <script src="script.js"></script>
</body>
</html>
